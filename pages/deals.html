<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Express Roadside Stop</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  
    <!-- SEO & PWA -->
    <meta name="description" content="4-Way Quick Stop - Your express roadside stop for fuel, food, snacks, and great deals in Joppa, AL.">
    <meta property="og:title" content="4-Way Quick Stop">
    <meta property="og:description" content="Your express roadside stop for fuel, food, snacks, and great deals in Joppa, AL.">
    <meta property="og:type" content="website">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#f97316">

    <!-- Prevent Theme Flicker -->
    <script>
      if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    </script>
  </head>
  <body class="bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-white dark:text-slate-100 font-sans antialiased transition-colors duration-300 pb-16 md:pb-0">

    <!-- Announcement Bar (Hidden by default) -->
    <div id="announcement-bar" class="hidden bg-orange-500 text-white px-4 py-2 text-center text-sm font-bold shadow-md relative z-50 reveal-on-scroll">
      <span data-bind="announcement"></span>
    </div>

    <!-- Component A: Sticky Global Header -->
    <header class="sticky top-0 z-50 bg-slate-900 text-white shadow-md">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
          <div class="flex-shrink-0 flex items-center">
            <a href="/" class="font-extrabold text-xl tracking-tight text-slate-300" data-bind="businessName">...</a>
          </div>
          <nav class="hidden md:flex space-x-8">
            <a href="/pages/fuel.html" class="hover:text-white transition-colors font-semibold text-slate-300">Fuel</a>
            <a href="/pages/store.html" class="hover:text-white transition-colors font-semibold text-slate-300">Store</a>
            <a href="/pages/food.html" class="hover:text-white transition-colors font-semibold text-slate-300">Food</a>
            <a href="/pages/deals.html" class="hover:text-white transition-colors font-semibold text-slate-300">Deals</a>
            <a href="/pages/location.html" class="hover:text-white transition-colors font-semibold text-slate-300">Location</a>
          </nav>
          <div class="flex items-center space-x-4">
            <button id="theme-toggle" class="relative p-2 rounded-full hover:bg-slate-700 transition-colors focus:outline-none w-9 h-9 flex items-center justify-center overflow-hidden" aria-label="Toggle Dark Mode">
              <svg id="theme-toggle-dark-icon" class="absolute w-5 h-5 text-white transition-all duration-500 transform theme-icon-dark" fill="currentColor" viewBox="0 0 20 20">
                <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path>
              </svg>
              <svg id="theme-toggle-light-icon" class="absolute w-5 h-5 text-white transition-all duration-500 transform theme-icon-light" fill="currentColor" viewBox="0 0 20 20">
                <path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4.22 4.22a1 1 0 011.415 0l.708.708a1 1 0 01-1.414 1.414l-.708-.708a1 1 0 010-1.414zM18 10a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zm-4.22 4.22a1 1 0 010 1.415l-.708.708a1 1 0 01-1.414-1.414l.708-.708a1 1 0 011.415 0zM10 16a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zm-4.22-4.22a1 1 0 010-1.415l-.708-.708a1 1 0 01-1.414 1.414l.708.708a1 1 0 011.415 0zM2 10a1 1 0 011-1h1a1 1 0 110 2H3a1 1 0 01-1-1zm4.22-4.22a1 1 0 011.415 0l.708.708a1 1 0 01-1.414 1.414l-.708-.708a1 1 0 010-1.414zM10 5a5 5 0 100 10 5 5 0 000-10z" fill-rule="evenodd" clip-rule="evenodd"></path>
              </svg>
            </button>
            <a href="#" data-action="route" class="bg-orange-600 hover:bg-orange-500 text-white px-5 py-2 rounded-md font-bold transition-colors shadow-sm">
              Get Directions
            </a>
          </div>
        </div>
      </div>
    </header>

    <!-- Component E: Deals Grid -->
    <section id="deals" class="relative py-16 bg-slate-900 min-h-[calc(100vh-200px)] overflow-hidden">
      
      <!-- Parallax Background Image -->
      <div class="absolute inset-0 z-0">
        <div class="absolute inset-0 bg-cover bg-center bg-no-repeat bg-fixed transform scale-105 transition-transform duration-1000" style="background-image: url('/images/food_bg.png');"></div>
        <div class="absolute inset-0 bg-slate-900/60 dark:bg-slate-900/80 backdrop-blur-[2px]"></div>
        <!-- Gradient Overlay -->
        <div class="absolute inset-0 bg-gradient-to-b from-slate-900/80 via-transparent to-slate-900/90 dark:from-slate-900/90 dark:to-slate-900"></div>
      </div>

      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
        
        <!-- Glassmorphism Header -->
        <div class="bg-white/10 dark:bg-slate-900/40 backdrop-blur-xl border border-white/20 rounded-3xl p-8 mb-16 shadow-2xl reveal-on-scroll">
          <div class="text-center">
            <h2 class="text-4xl md:text-5xl font-extrabold text-white tracking-tight drop-shadow-lg">Today's Deals</h2>
            <p class="mt-4 text-xl text-white/90 font-medium max-w-2xl mx-auto drop-shadow-md">Exclusive discounts and offers for our travelers.</p>
          </div>
        </div>
        
        <div id="deals-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 relative z-10">
          <div class="animate-pulse bg-white/10 dark:bg-slate-900/40 backdrop-blur-md rounded-2xl overflow-hidden shadow-lg border border-white/10 flex flex-col h-96">
            <div class="h-56 bg-white/10 dark:bg-slate-800"></div>
            <div class="p-6 flex-grow flex flex-col">
              <div class="h-6 bg-white/10 dark:bg-slate-800 rounded w-3/4 mb-4"></div>
              <div class="h-4 bg-white/10 dark:bg-slate-800 rounded w-full mb-2"></div>
              <div class="h-4 bg-white/10 dark:bg-slate-800 rounded w-5/6 mb-6"></div>
              <div class="mt-auto h-8 bg-white/10 dark:bg-slate-800 rounded w-1/4"></div>
            </div>
          </div>
          <!-- More skeletons... -->
        </div>
      </div>
    </section>


    <footer class="bg-slate-900 pt-12 pb-8 border-t border-slate-800 relative z-10">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8">
          <div class="mb-4 md:mb-0">
            <span class="font-extrabold text-xl tracking-tight text-white" data-bind="businessName">...</span>
            <p class="text-slate-400 mt-2 text-sm max-w-sm" data-bind="address">...</p>
          </div>
        </div>
        <div class="border-t border-slate-800 pt-8 text-center md:text-left flex flex-col md:flex-row justify-between items-center">
          <p class="text-slate-500 text-sm">
            &copy; <span data-bind="currentYear">...</span> <span data-bind="businessName">...</span>. All rights reserved.
          </p>
        </div>
      </div>
    </footer>
    
    <!-- Mobile Bottom Navigation -->
    <nav class="md:hidden fixed bottom-0 w-full bg-slate-900 border-t border-slate-800 z-50 pb-safe">
      <!-- Nav identical -->
    </nav>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
