<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Express Roadside Stop</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  </head>
  <body class="bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 font-sans antialiased transition-colors duration-300 pb-16 md:pb-0">

    <!-- Announcement Bar (Hidden by default) -->
    <div id="announcement-bar" class="hidden bg-orange-500 text-white px-4 py-2 text-center text-sm font-bold shadow-md relative z-50 animate-fade-in-up">
      <span data-bind="announcement"></span>
    </div>

    <!-- Component A: Sticky Global Header -->
    <header class="sticky top-0 z-50 bg-slate-900 text-white shadow-md">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
          <div class="flex-shrink-0 flex items-center">
            <a href="/" class="font-extrabold text-xl tracking-tight" data-bind="businessName">...</a>
          </div>
          <nav class="hidden md:flex space-x-8">
            <a href="/pages/fuel.html" class="text-slate-300 hover:text-white transition-colors font-semibold">Fuel</a>
            <a href="/pages/store.html" class="text-slate-300 hover:text-white transition-colors font-semibold">Store</a>
            <a href="/pages/food.html" class="text-slate-300 hover:text-white transition-colors font-semibold">Food</a>
            <a href="/pages/location.html" class="text-slate-300 hover:text-white transition-colors font-semibold">Location</a>
          </nav>
          <div class="flex items-center space-x-4">
            <button id="theme-toggle" class="p-2 rounded-full hover:bg-slate-700 transition-colors focus:outline-none" aria-label="Toggle Dark Mode">
              <svg id="theme-toggle-dark-icon" class="hidden w-5 h-5 text-white" fill="currentColor" viewBox="0 0 20 20">
                <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path>
              </svg>
              <svg id="theme-toggle-light-icon" class="hidden w-5 h-5 text-white" fill="currentColor" viewBox="0 0 20 20">
                <path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4.22 4.22a1 1 0 011.415 0l.708.708a1 1 0 01-1.414 1.414l-.708-.708a1 1 0 010-1.414zM18 10a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zm-4.22 4.22a1 1 0 010 1.415l-.708.708a1 1 0 01-1.414-1.414l.708-.708a1 1 0 011.415 0zM10 16a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zm-4.22-4.22a1 1 0 010-1.415l-.708-.708a1 1 0 01-1.414 1.414l.708.708a1 1 0 011.415 0zM2 10a1 1 0 011-1h1a1 1 0 110 2H3a1 1 0 01-1-1zm4.22-4.22a1 1 0 011.415 0l.708.708a1 1 0 01-1.414 1.414l-.708-.708a1 1 0 010-1.414zM10 5a5 5 0 100 10 5 5 0 000-10z" fill-rule="evenodd" clip-rule="evenodd"></path>
              </svg>
            </button>
            <a href="#" data-action="route" class="bg-orange-600 hover:bg-orange-500 text-white px-5 py-2 rounded-md font-bold transition-colors shadow-sm">
              Get Directions
            </a>
          </div>
        </div>
      </div>
    </header>

    <!-- Content Area Placeholder -->
    
    <!-- Component C: Live Fuel Rates Matrix -->
    <section id="fuel" class="py-20 bg-slate-900 min-h-[calc(100vh-200px)]">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="text-center mb-16 animate-fade-in-up">
          <h2 class="text-4xl font-extrabold text-white tracking-tight mb-4">Current Fuel Services</h2>
          <p class="text-xl text-slate-400">Premium grades for all vehicle types.</p>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 max-w-5xl mx-auto animate-fade-in-up" style="animation-delay: 0.2s">
          
          <!-- Regular -->
          <div class="glass-panel rounded-2xl p-8 text-center transition-transform transform hover:-translate-y-2 hover:shadow-2xl">
            <h3 class="text-2xl font-bold text-slate-300 uppercase tracking-wide mb-2">Regular</h3>
            <p class="text-sm text-slate-500 mb-8 uppercase tracking-widest font-semibold">87 Octane</p>
            <div class="text-6xl font-extrabold text-green-400" data-bind="fuel.regular">...</div>
          </div>
          
          <!-- Premium -->
          <div class="bg-gradient-to-b from-slate-800 to-slate-900 rounded-2xl p-8 border border-orange-500/50 text-center shadow-[0_0_20px_rgba(249,115,22,0.15)] transition-transform transform md:-translate-y-4 hover:-translate-y-6 hover:shadow-[0_0_30px_rgba(249,115,22,0.3)] relative">
            <div class="absolute -top-4 left-1/2 transform -translate-x-1/2 bg-orange-600 text-white px-6 py-1.5 rounded-full text-sm font-bold uppercase tracking-widest shadow-lg">
              Top Tier
            </div>
            <h3 class="text-2xl font-bold text-white uppercase tracking-wide mb-2 mt-4">Premium</h3>
            <p class="text-sm text-slate-400 mb-8 uppercase tracking-widest font-semibold">93 Octane</p>
            <div class="text-7xl font-extrabold text-orange-500" data-bind="fuel.premium">...</div>
          </div>
          
          <!-- Diesel -->
          <div class="glass-panel rounded-2xl p-8 text-center transition-transform transform hover:-translate-y-2 hover:shadow-2xl">
            <h3 class="text-2xl font-bold text-slate-300 uppercase tracking-wide mb-2">Diesel</h3>
            <p class="text-sm text-slate-500 mb-8 uppercase tracking-widest font-semibold">Ultra-Low Sulfur</p>
            <div class="text-6xl font-extrabold text-blue-400" data-bind="fuel.diesel">...</div>
          </div>
          
        </div>
      </div>
    </section>


    <footer class="bg-slate-900 pt-12 pb-8 border-t border-slate-800">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8">
          <div class="mb-4 md:mb-0">
            <span class="font-extrabold text-xl tracking-tight text-white" data-bind="businessName">...</span>
            <p class="text-slate-400 mt-2 text-sm max-w-sm" data-bind="address">...</p>
          </div>
        </div>
        <div class="border-t border-slate-800 pt-8 text-center md:text-left flex flex-col md:flex-row justify-between items-center">
          <p class="text-slate-500 text-sm">
            &copy; <span data-bind="currentYear">...</span> <span data-bind="businessName">...</span>. All rights reserved.
          </p>
        </div>
      </div>
    </footer>
    
    <!-- Mobile Bottom Navigation -->
    <nav class="md:hidden fixed bottom-0 w-full bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 z-50 pb-safe">
      <div class="flex justify-around items-center h-16">
        <a href="/" class="flex flex-col items-center justify-center w-full h-full text-slate-500 dark:text-slate-400 hover:text-orange-500 dark:hover:text-orange-400 transition-colors">
          <span class="text-xl mb-1">🏠</span>
          <span class="text-[10px] font-bold uppercase tracking-wider">Home</span>
        </a>
        <a href="/pages/fuel.html" class="flex flex-col items-center justify-center w-full h-full text-slate-500 dark:text-slate-400 hover:text-orange-500 dark:hover:text-orange-400 transition-colors">
          <span class="text-xl mb-1">⛽</span>
          <span class="text-[10px] font-bold uppercase tracking-wider">Fuel</span>
        </a>
        <a href="/pages/store.html" class="flex flex-col items-center justify-center w-full h-full text-slate-500 dark:text-slate-400 hover:text-orange-500 dark:hover:text-orange-400 transition-colors">
          <span class="text-xl mb-1">🏪</span>
          <span class="text-[10px] font-bold uppercase tracking-wider">Store</span>
        </a>
        <a href="/pages/food.html" class="flex flex-col items-center justify-center w-full h-full text-slate-500 dark:text-slate-400 hover:text-orange-500 dark:hover:text-orange-400 transition-colors">
          <span class="text-xl mb-1">🍔</span>
          <span class="text-[10px] font-bold uppercase tracking-wider">Food</span>
        </a>
        <a href="#" data-action="route" class="flex flex-col items-center justify-center w-full h-full text-slate-500 dark:text-slate-400 hover:text-orange-500 dark:hover:text-orange-400 transition-colors">
          <span class="text-xl mb-1">📍</span>
          <span class="text-[10px] font-bold uppercase tracking-wider">Route</span>
        </a>
      </div>
    </nav>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
