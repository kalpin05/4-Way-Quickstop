<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Express Roadside Stop</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  
    <!-- SEO & PWA -->
    <meta name="description" content="4-Way Quick Stop - Your express roadside stop for fuel, food, snacks, and great deals in Joppa, AL.">
    <meta property="og:title" content="4-Way Quick Stop">
    <meta property="og:description" content="Your express roadside stop for fuel, food, snacks, and great deals in Joppa, AL.">
    <meta property="og:type" content="website">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#f97316">

    <!-- Prevent Theme Flicker -->
    <script>
      if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    </script>
  </head>
  <body class="bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-white dark:text-slate-100 font-sans antialiased transition-colors duration-300 pb-16 md:pb-0">

    <!-- Announcement Bar (Hidden by default) -->
    <div id="announcement-bar" class="hidden bg-orange-500 text-white px-4 py-2 text-center text-sm font-bold shadow-md relative z-50 reveal-on-scroll">
      <span data-bind="announcement"></span>
    </div>

    <!-- Component A: Sticky Global Header -->
    <header class="sticky top-0 z-50 bg-slate-900 text-white shadow-md">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
          <div class="flex-shrink-0 flex items-center">
            <a href="/" class="font-extrabold text-xl tracking-tight text-slate-300" data-bind="businessName">...</a>
          </div>
          <nav class="hidden md:flex space-x-8">
            <a href="/pages/fuel.html" class="hover:text-white transition-colors font-semibold text-slate-300">Fuel</a>
            <a href="/pages/store.html" class="hover:text-white transition-colors font-semibold text-slate-300">Store</a>
            <a href="/pages/food.html" class="hover:text-white transition-colors font-semibold text-slate-300">Food</a>
            <a href="/pages/deals.html" class="hover:text-white transition-colors font-semibold text-slate-300">Deals</a>
            <a href="/pages/location.html" class="hover:text-white transition-colors font-semibold text-slate-300">Location</a>
          </nav>
          <div class="flex items-center space-x-4">
            <button id="theme-toggle" class="relative p-2 rounded-full hover:bg-slate-700 transition-colors focus:outline-none w-9 h-9 flex items-center justify-center overflow-hidden" aria-label="Toggle Dark Mode">
              <svg id="theme-toggle-dark-icon" class="absolute w-5 h-5 text-white transition-all duration-500 transform theme-icon-dark" fill="currentColor" viewBox="0 0 20 20">
                <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path>
              </svg>
              <svg id="theme-toggle-light-icon" class="absolute w-5 h-5 text-white transition-all duration-500 transform theme-icon-light" fill="currentColor" viewBox="0 0 20 20">
                <path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4.22 4.22a1 1 0 011.415 0l.708.708a1 1 0 01-1.414 1.414l-.708-.708a1 1 0 010-1.414zM18 10a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zm-4.22 4.22a1 1 0 010 1.415l-.708.708a1 1 0 01-1.414-1.414l.708-.708a1 1 0 011.415 0zM10 16a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zm-4.22-4.22a1 1 0 010-1.415l-.708-.708a1 1 0 01-1.414 1.414l.708.708a1 1 0 011.415 0zM2 10a1 1 0 011-1h1a1 1 0 110 2H3a1 1 0 01-1-1zm4.22-4.22a1 1 0 011.415 0l.708.708a1 1 0 01-1.414 1.414l-.708-.708a1 1 0 010-1.414zM10 5a5 5 0 100 10 5 5 0 000-10z" fill-rule="evenodd" clip-rule="evenodd"></path>
              </svg>
            </button>
            <a href="#" data-action="route" class="bg-orange-600 hover:bg-orange-500 text-white px-5 py-2 rounded-md font-bold transition-colors shadow-sm">
              Get Directions
            </a>
          </div>
        </div>
      </div>
    </header>

    <!-- Component E: Fresh Food Court Menu Grid -->
    <section id="food" class="relative py-16 bg-slate-900 min-h-[calc(100vh-200px)] overflow-hidden">
      
      <!-- Parallax Background Image -->
      <div class="absolute inset-0 z-0">
        <div class="absolute inset-0 bg-cover bg-center bg-no-repeat bg-fixed transform scale-105 transition-transform duration-1000" style="background-image: url('/images/food_bg.png');"></div>
        <div class="absolute inset-0 bg-slate-900/60 dark:bg-slate-900/80 backdrop-blur-[2px]"></div>
        <!-- Gradient Overlay -->
        <div class="absolute inset-0 bg-gradient-to-b from-slate-900/80 via-transparent to-slate-900/90 dark:from-slate-900/90 dark:to-slate-900"></div>
      </div>

      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
        
        <!-- Glassmorphism Header & Search Box -->
        <div class="bg-white/10 dark:bg-slate-900/40 backdrop-blur-xl border border-white/20 rounded-3xl p-8 mb-12 shadow-2xl reveal-on-scroll">
          <div class="text-center mb-8">
            <h2 class="text-4xl md:text-5xl font-extrabold text-white tracking-tight drop-shadow-lg">Fresh Kitchen Menu</h2>
            <p class="mt-4 text-xl text-white/90 font-medium max-w-2xl mx-auto drop-shadow-md">Hot, fresh, and made to order. Perfect for the road.</p>
            <div class="mt-6 inline-block bg-orange-500 text-white px-6 py-2 rounded-full font-bold shadow-lg shadow-orange-500/30">
              Kitchen Hours: <span data-bind="foodHours">...</span>
            </div>
          </div>

          <!-- Search and Filter Section -->
          <div class="max-w-3xl mx-auto">
            <div class="relative group">
              <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-white/70 text-xl transition-colors group-hover:text-orange-400">🔍</span>
              <input type="text" id="food-search" placeholder="Search for burgers, sandwiches, drinks..." class="w-full pl-12 pr-4 py-4 rounded-2xl border border-white/20 bg-white/10 text-white placeholder-white/70 focus:outline-none focus:border-orange-500 focus:bg-white/20 shadow-inner text-lg transition-all backdrop-blur-md" />
            </div>
            
            <div class="flex flex-wrap justify-center gap-3 mt-6" id="food-filters">
              <!-- Filter buttons injected dynamically here -->
            </div>
          </div>
        </div>

        <div id="food-container" class="grid grid-cols-1 md:grid-cols-3 gap-8 relative z-10">
          <div class="animate-pulse bg-white/10 dark:bg-slate-900/40 backdrop-blur-md rounded-2xl overflow-hidden shadow-lg border border-white/10 flex flex-col h-96">
            <div class="h-56 bg-white/10 dark:bg-slate-800"></div>
            <div class="p-6 flex-grow flex flex-col">
              <div class="h-6 bg-white/10 dark:bg-slate-800 rounded w-3/4 mb-4"></div>
              <div class="h-4 bg-white/10 dark:bg-slate-800 rounded w-full mb-2"></div>
              <div class="h-4 bg-white/10 dark:bg-slate-800 rounded w-5/6 mb-6"></div>
              <div class="mt-auto h-8 bg-white/10 dark:bg-slate-800 rounded w-1/4"></div>
            </div>
          </div>
          
          <div class="animate-pulse bg-white/10 dark:bg-slate-900/40 backdrop-blur-md rounded-2xl overflow-hidden shadow-lg border border-white/10 flex flex-col h-96">
            <div class="h-56 bg-white/10 dark:bg-slate-800"></div>
            <div class="p-6 flex-grow flex flex-col">
              <div class="h-6 bg-white/10 dark:bg-slate-800 rounded w-3/4 mb-4"></div>
              <div class="h-4 bg-white/10 dark:bg-slate-800 rounded w-full mb-2"></div>
              <div class="h-4 bg-white/10 dark:bg-slate-800 rounded w-5/6 mb-6"></div>
              <div class="mt-auto h-8 bg-white/10 dark:bg-slate-800 rounded w-1/4"></div>
            </div>
          </div>
          
          <div class="animate-pulse bg-white/10 dark:bg-slate-900/40 backdrop-blur-md rounded-2xl overflow-hidden shadow-lg border border-white/10 flex flex-col h-96">
            <div class="h-56 bg-white/10 dark:bg-slate-800"></div>
            <div class="p-6 flex-grow flex flex-col">
              <div class="h-6 bg-white/10 dark:bg-slate-800 rounded w-3/4 mb-4"></div>
              <div class="h-4 bg-white/10 dark:bg-slate-800 rounded w-full mb-2"></div>
              <div class="h-4 bg-white/10 dark:bg-slate-800 rounded w-5/6 mb-6"></div>
              <div class="mt-auto h-8 bg-white/10 dark:bg-slate-800 rounded w-1/4"></div>
            </div>
          </div>

          <!-- Food cards injected dynamically here -->
        </div>
      </div>
    </section>

    <footer class="bg-slate-900 pt-12 pb-8 border-t border-slate-800 relative z-10">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8">
          <div class="mb-4 md:mb-0">
            <span class="font-extrabold text-xl tracking-tight text-white" data-bind="businessName">...</span>
            <p class="text-slate-400 mt-2 text-sm max-w-sm" data-bind="address">...</p>
          </div>
        </div>
        <div class="border-t border-slate-800 pt-8 text-center md:text-left flex flex-col md:flex-row justify-between items-center">
          <p class="text-slate-500 text-sm">
            &copy; <span data-bind="currentYear">...</span> <span data-bind="businessName">...</span>. All rights reserved.
          </p>
        </div>
      </div>
    </footer>
    
    <!-- Mobile Bottom Navigation -->
    <nav class="md:hidden fixed bottom-0 w-full bg-slate-900 border-t border-slate-800 z-50 pb-safe">
      <div class="flex justify-around items-center h-16">
        <a href="/" class="flex flex-col items-center justify-center w-full h-full hover:text-orange-400 transition-colors text-slate-500 dark:text-slate-400">
          <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
          <span class="text-[10px] font-bold uppercase tracking-wider">Home</span>
        </a>
        <a href="/pages/fuel.html" class="flex flex-col items-center justify-center w-full h-full hover:text-orange-400 transition-colors text-slate-500 dark:text-slate-400">
          <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
          <span class="text-[10px] font-bold uppercase tracking-wider">Fuel</span>
        </a>
        <a href="/pages/store.html" class="flex flex-col items-center justify-center w-full h-full hover:text-orange-400 transition-colors text-slate-500 dark:text-slate-400">
          <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
          <span class="text-[10px] font-bold uppercase tracking-wider">Store</span>
        </a>
        <a href="/pages/food.html" class="flex flex-col items-center justify-center w-full h-full hover:text-orange-400 transition-colors text-slate-500 dark:text-slate-400">
          <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 15.546c-.523 0-1.046.151-1.5.454a2.704 2.704 0 01-3 0 2.704 2.704 0 00-3 0 2.704 2.704 0 01-3 0 2.704 2.704 0 00-3 0 2.704 2.704 0 01-3 0 2.701 2.701 0 00-1.5-.454M9 6v2m3-2v2m3-2v2M9 3h.01M12 3h.01M15 3h.01M21 21v-7a2 2 0 00-2-2H5a2 2 0 00-2 2v7h18zm-3-9v-2a2 2 0 00-2-2H8a2 2 0 00-2 2v2h12z"></path></svg>
          <span class="text-[10px] font-bold uppercase tracking-wider">Food</span>
        </a>
        <a href="/pages/deals.html" class="flex flex-col items-center justify-center w-full h-full hover:text-orange-400 transition-colors text-slate-500 dark:text-slate-400">
          <span class="text-xl mb-1">🔥</span>
          <span class="text-[10px] font-bold uppercase tracking-wider">Deals</span>
        </a>
        <a href="#" data-action="route" class="flex flex-col items-center justify-center w-full h-full hover:text-orange-400 transition-colors text-slate-500 dark:text-slate-400">
          <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
          <span class="text-[10px] font-bold uppercase tracking-wider">Route</span>
        </a>
      </div>
    </nav>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
